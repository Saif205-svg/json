<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        #post-container{
            max-width: 1160px;
            margin: 50px auto;
            display: grid;
            grid-template-columns: repeat(3,1fr);
            grid-gap: 20px;
        }
        .post-card{
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 10px;
            box-shadow: 1px 1px 1px 1px gray;
        }
        .post-card p{
            text-align: justify;
        }
    </style>
</head>
<body>
    <button onclick="loadData()">Load Data</button>
    <button onclick="postData()">Load Post</button>
    <div id="post-container">

    </div>
